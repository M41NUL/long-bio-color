<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LONG BIO COLOR</title>
<link rel="icon" type="image/png" href="https://dl.dir.freefiremobile.com/common/web_event/tweb-event/FFSH/assets-common/ff-logo-icon.png">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.12);
    --border-bright: rgba(255,255,255,0.22);
    --text: #f0f0f5;
    --text-secondary: rgba(240,240,245,0.55);
    --accent: #ffb400;
    --accent-dim: rgba(255,180,0,0.15);
    --glass: rgba(20,20,30,0.72);
    --glass-light: rgba(255,255,255,0.06);
    --pill-track: rgba(255,255,255,0.1);
    --pill-thumb: #fff;
    --pill-thumb-shadow: rgba(0,0,0,0.35);
    --input-bg: rgba(255,255,255,0.04);
    --preview-bg: rgba(0,0,0,0.5);
    --footer-bg: rgba(255,255,255,0.03);
    --toolbar-bg: rgba(255,255,255,0.04);
    --toolbar-border: rgba(255,255,255,0.08);
  }
  [data-theme="light"] {
    --bg: #f2f2f7;
    --surface: rgba(255,255,255,0.72);
    --surface-hover: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.1);
    --border-bright: rgba(0,0,0,0.18);
    --text: #1c1c1e;
    --text-secondary: rgba(28,28,30,0.55);
    --accent: #d4930a;
    --accent-dim: rgba(212,147,10,0.12);
    --glass: rgba(242,242,247,0.85);
    --glass-light: rgba(255,255,255,0.6);
    --pill-track: rgba(0,0,0,0.1);
    --pill-thumb: #fff;
    --pill-thumb-shadow: rgba(0,0,0,0.2);
    --input-bg: rgba(0,0,0,0.04);
    --preview-bg: rgba(0,0,0,0.06);
    --footer-bg: rgba(0,0,0,0.03);
    --toolbar-bg: rgba(0,0,0,0.03);
    --toolbar-border: rgba(0,0,0,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 0;
    transition: background 0.45s ease, color 0.45s ease;
    position: relative;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(255,180,0,0.08) 0%, transparent 70%);
    top: -120px; left: -120px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(100,80,255,0.07) 0%, transparent 70%);
    bottom: 80px; right: -80px;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
    animation: riseIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 28px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,180,0,0.25);
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease;
  }
  .header-logo:hover { transform: scale(1.08) rotate(-3deg); }
  .header-logo img { width: 26px; height: 26px; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
  .header-title span { color: var(--accent); }

  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.3px; transition: color 0.3s; }
  .toggle-pill { position: relative; width: 50px; height: 28px; cursor: pointer; }
  .toggle-pill input { display: none; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--pill-track);
    border-radius: 999px;
    border: 1px solid var(--border);
    transition: background 0.35s cubic-bezier(0.4,0,0.2,1);
    backdrop-filter: blur(8px);
  }
  .toggle-pill input:checked ~ .toggle-track { background: rgba(255,180,0,0.75); border-color: rgba(255,180,0,0.4); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    background: var(--pill-thumb);
    border-radius: 50%;
    box-shadow: 0 1px 4px var(--pill-thumb-shadow);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toggle-pill input:checked ~ .toggle-thumb { transform: translateX(22px); }

  .card {
    background: var(--glass);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 22px;
    margin-bottom: 14px;
    transition: background 0.45s ease, border-color 0.45s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--glass-light) 0%, transparent 60%);
    pointer-events: none;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  /* PALETTE */
  .palette { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 18px; }
  .color-btn {
    width: 32px; height: 32px;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s;
    position: relative;
  }
  .color-btn:hover { transform: scale(1.22) translateY(-2px); border-color: rgba(255,255,255,0.6); }
  .color-btn:active { transform: scale(0.94); }

  .custom-color-row { display: flex; align-items: center; gap: 12px; }
  input[type="color"] {
    width: 44px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    cursor: pointer;
    padding: 2px;
    transition: border-color 0.2s;
  }
  input[type="color"]:hover { border-color: var(--border-bright); }

  /* TOOLBAR */
  .format-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 11px 13px;
    background: var(--toolbar-bg);
    border: 1px solid var(--toolbar-border);
    border-radius: 14px 14px 0 0;
    border-bottom: none;
  }
  .fmt-group { display: flex; gap: 4px; align-items: center; }
  .fmt-divider { width: 1px; height: 22px; background: var(--border); margin: 0 3px; border-radius: 1px; }

  .fmt-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1), color 0.18s;
    min-width: 34px;
    height: 32px;
    user-select: none;
    white-space: nowrap;
  }
  .fmt-btn:hover { background: var(--surface-hover); border-color: var(--border-bright); transform: translateY(-1px); }
  .fmt-btn:active { transform: scale(0.91); }

  /* Active state — toggled ON */
  .fmt-btn.is-on {
    background: rgba(255,180,0,0.2);
    border-color: rgba(255,180,0,0.5);
    color: var(--accent);
  }

  .fmt-label { font-size: 10px; font-weight: 600; letter-spacing: 0.2px; }

  textarea {
    width: 100%;
    height: 110px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 0 0 14px 14px;
    font-size: 15px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--input-bg);
    color: var(--text);
    resize: none;
    outline: none;
    transition: border-color 0.25s, background 0.3s;
    backdrop-filter: blur(8px);
  }
  textarea:focus { border-color: rgba(255,180,0,0.5); background: rgba(255,180,0,0.04); }
  textarea::placeholder { color: var(--text-secondary); }

  .char-counter {
    text-align: right;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin: 6px 2px 0;
    transition: color 0.3s;
  }
  .char-counter.warn { color: #ff6b6b; }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.22s, border-color 0.22s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface-hover); border-color: var(--border-bright); transform: translateY(-2px); }
  .btn:active { transform: scale(0.96); }
  .btn.primary { background: rgba(255,180,0,0.18); border-color: rgba(255,180,0,0.4); color: var(--accent); }
  .btn.primary:hover { background: rgba(255,180,0,0.28); border-color: rgba(255,180,0,0.6); }

  #status {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    backdrop-filter: blur(16px);
    white-space: nowrap;
  }
  #status.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #status.success { background: rgba(48,209,88,0.9); color: #fff; }
  #status.error { background: rgba(255,69,58,0.9); color: #fff; }

  /* PREVIEW BOX */
  .preview-box {
    background: var(--preview-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    min-height: 64px;
    font-size: 17px;
    line-height: 1.65;
    word-break: break-word;
    backdrop-filter: blur(10px);
    transition: background 0.3s;
  }

  /* These classes applied inline by JS renderer */
  .p-bold { font-weight: 800; }
  .p-italic { font-style: italic; }
  .p-underline { text-decoration: underline; }
  .p-strike { text-decoration: line-through; }
  .p-underline.p-strike { text-decoration: underline line-through; }
  .p-center { display: block; text-align: center; }
  .p-left   { display: block; text-align: left; }
  .p-right  { display: block; text-align: right; }

  /* FOOTER */
  footer {
    width: 100%;
    max-width: 680px;
    margin-top: 28px;
    padding: 28px 28px 24px;
    background: var(--footer-bg);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .footer-dev { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .footer-avatar-img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,180,0,0.45); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .footer-avatar-img:hover { transform: scale(1.08); }
  .footer-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .footer-handle { font-size: 12px; color: var(--accent); font-weight: 500; margin-top: 1px; }
  .footer-links { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .footer-link {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    font-size: 12px; font-weight: 500;
    transition: background 0.2s, border-color 0.2s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(8px);
  }
  .footer-link:hover { background: var(--surface-hover); border-color: var(--border-bright); transform: translateY(-2px); }
  .footer-copy { margin-top: 16px; font-size: 11px; color: var(--text-secondary); }

  @keyframes springPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35) translateY(-3px); }
    70%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }
  .color-btn.popped { animation: springPop 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  @media (max-width: 480px) {
    .header-title { font-size: 16px; }
    .card { padding: 16px; }
    footer { padding: 20px 16px; }
    .fmt-btn { padding: 5px 8px; min-width: 30px; height: 30px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <img src="https://i.ibb.co/1tjyxPMJ/927db1619cd4.jpg" alt="Logo">
      </div>
      <div class="header-title">LONG BIO <span>COLOR</span></div>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="themeLabel">Dark</span>
      <label class="toggle-pill">
        <input type="checkbox" id="themeToggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- COLOR PALETTE -->
  <div class="card" style="animation: riseIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0s both;">
    <div class="section-label">Quick Colors</div>
    <div class="palette" id="palette"></div>
    <div class="section-label" style="margin-top:4px;">Custom Color</div>
    <div class="custom-color-row">
      <input type="color" id="colorPicker" value="#FF0000">
      <button class="btn primary" onclick="applyCustomColor()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Add Color
      </button>
    </div>
  </div>

  <!-- EDITOR CARD -->
  <div class="card" style="animation: riseIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.07s both;">
    <div class="section-label">Bio Editor</div>

    <!-- FORMAT TOOLBAR -->
    <div class="format-toolbar">
      <div class="fmt-group">
        <!-- Bold -->
        <button class="fmt-btn" id="btn-B" onclick="toggleFmtTag('B')" title="Bold [B]">
          <b style="font-family:Georgia,serif;font-size:14px;letter-spacing:-0.5px;">B</b>
        </button>
        <!-- Italic -->
        <button class="fmt-btn" id="btn-I" onclick="toggleFmtTag('I')" title="Italic [I]">
          <i style="font-family:Georgia,serif;font-style:italic;font-size:14px;">I</i>
        </button>
        <!-- Underline -->
        <button class="fmt-btn" id="btn-U" onclick="toggleFmtTag('U')" title="Underline [U]">
          <u style="font-size:13px;">U</u>
        </button>
        <!-- Strike -->
        <button class="fmt-btn" id="btn-S" onclick="toggleFmtTag('S')" title="Strikethrough [S]">
          <s style="font-size:13px;">S</s>
        </button>
      </div>

      <div class="fmt-divider"></div>

      <div class="fmt-group">
        <!-- Left -->
        <button class="fmt-btn" id="btn-L" onclick="toggleAlignTag('L')" title="Align Left [L]">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor">
            <rect x="0" y="0" width="14" height="2" rx="1"/>
            <rect x="0" y="5" width="10" height="2" rx="1"/>
            <rect x="0" y="10" width="12" height="2" rx="1"/>
          </svg>
        </button>
        <!-- Center -->
        <button class="fmt-btn" id="btn-C" onclick="toggleAlignTag('C')" title="Center [C]">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor">
            <rect x="0" y="0" width="14" height="2" rx="1"/>
            <rect x="2" y="5" width="10" height="2" rx="1"/>
            <rect x="1" y="10" width="12" height="2" rx="1"/>
          </svg>
        </button>
        <!-- Right -->
        <button class="fmt-btn" id="btn-R" onclick="toggleAlignTag('R')" title="Align Right [R]">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor">
            <rect x="0" y="0" width="14" height="2" rx="1"/>
            <rect x="4" y="5" width="10" height="2" rx="1"/>
            <rect x="2" y="10" width="12" height="2" rx="1"/>
          </svg>
        </button>
      </div>

      <div class="fmt-divider"></div>

      <div class="fmt-group">
        <!-- Line break -->
        <button class="fmt-btn" onclick="insertLineBreak()" title="New Line">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 10 4 15 9 20"/>
            <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
          </svg>
          <span class="fmt-label">BR</span>
        </button>
      </div>
    </div>

    <!-- TEXTAREA -->
    <textarea id="editor" placeholder="Type your bio here..."></textarea>
    <div id="charCount" class="char-counter">0 characters</div>
  </div>

  <!-- CONTROLS -->
  <div class="card" style="animation: riseIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.12s both;">
    <div class="controls">
      <button class="btn" onclick="clearEditor()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear
      </button>
      <button class="btn primary" onclick="copyBio()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Bio
      </button>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card" style="animation: riseIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.17s both;">
    <div class="section-label">In-Game Preview</div>
    <div id="preview" class="preview-box">
      <span style="color:rgba(255,255,255,0.25);font-size:14px;">Preview will appear here...</span>
    </div>
  </div>

</div>

<div id="status"></div>

<script>
  const COLORS = ["FFFF00","00FF00","FF0000","0000FF","00FFFF","FF00FF","FF9000","6E00FF","CCFF00","0F7209","FFD3EF","FFFFFF","000000","FF4500","1DA1F2","7289DA","00B0FF","FF6B6B","A8FF78","FFC0CB","FF1493","00FF7F","FF6600","8B00FF"];
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const statusEl = document.getElementById('status');
  let statusTimer;

  // ── Build color palette ──
  COLORS.forEach(hex => {
    const btn = document.createElement('div');
    btn.className = 'color-btn';
    btn.style.backgroundColor = '#' + hex;
    btn.title = '#' + hex;
    btn.onclick = () => {
      btn.classList.remove('popped');
      void btn.offsetWidth;
      btn.classList.add('popped');
      btn.addEventListener('animationend', () => btn.classList.remove('popped'), { once: true });
      insertTag('[' + hex.toUpperCase() + ']');
    };
    document.getElementById('palette').appendChild(btn);
  });

  function applyCustomColor() {
    const hex = document.getElementById('colorPicker').value.replace('#','').toUpperCase();
    insertTag('[' + hex + ']');
  }

  // ── Insert a tag at cursor (no closing tag — FF style) ──
  function insertTag(tag) {
    const s = editor.selectionStart;
    editor.value = editor.value.slice(0, s) + tag + editor.value.slice(s);
    editor.selectionStart = editor.selectionEnd = s + tag.length;
    editor.focus();
    update();
  }

  // ── Toggle format tags (B, I, U, S) ──
  // If button is already ON → insert same tag again to toggle OFF (FF reuses tag to toggle)
  function toggleFmtTag(key) {
    insertTag('[' + key + ']');
    syncToolbarState();
  }

  // ── Align tags (L, C, R) — mutual exclusive visual highlight ──
  function toggleAlignTag(key) {
    insertTag('[' + key + ']');
    // Visually highlight the chosen align btn
    ['L','C','R'].forEach(k => {
      document.getElementById('btn-' + k).classList.remove('is-on');
    });
    document.getElementById('btn-' + key).classList.add('is-on');
    editor.focus();
  }

  function insertLineBreak() {
    insertTag('\n');
  }

  // ── Sync toolbar highlight based on cursor position ──
  function syncToolbarState() {
    const text = editor.value.slice(0, editor.selectionStart);
    // For each toggle key count occurrences — odd = ON
    ['B','I','U','S'].forEach(key => {
      const re = new RegExp('\\[' + key + '\\]', 'gi');
      const matches = (text.match(re) || []).length;
      const btn = document.getElementById('btn-' + key);
      if (matches % 2 === 1) {
        btn.classList.add('is-on');
      } else {
        btn.classList.remove('is-on');
      }
    });
  }

  // ── Preview renderer ──
  // Parses FF-style tags and renders HTML with correct styles
  function renderPreview(raw) {
    // Tokenize: split on any [TAG] including color hex
    const tokenRe = /(\[[A-F0-9]{6}\]|\[B\]|\[I\]|\[U\]|\[S\]|\[C\]|\[L\]|\[R\])/gi;
    const parts = raw.split(tokenRe);

    // State
    let color = null;
    let bold = false, italic = false, underline = false, strike = false;
    let align = null; // null | 'L' | 'C' | 'R'

    let html = '';

    for (let part of parts) {
      if (!part) continue;

      const up = part.toUpperCase();

      if (/^\[[A-F0-9]{6}\]$/.test(up)) {
        color = up.slice(1, 7);
        continue;
      }

      switch(up) {
        case '[B]': bold = !bold; continue;
        case '[I]': italic = !italic; continue;
        case '[U]': underline = !underline; continue;
        case '[S]': strike = !strike; continue;
        case '[C]': align = (align === 'C') ? null : 'C'; continue;
        case '[L]': align = (align === 'L') ? null : 'L'; continue;
        case '[R]': align = (align === 'R') ? null : 'R'; continue;
      }

      // It's a text segment — render each line separately for align support
      const lines = part.split('\n');
      lines.forEach((line, idx) => {
        if (idx > 0) html += '<br>';
        if (!line) return;

        // Build CSS classes
        let cls = [];
        if (bold)      cls.push('p-bold');
        if (italic)    cls.push('p-italic');
        if (underline) cls.push('p-underline');
        if (strike)    cls.push('p-strike');
        if (align === 'C') cls.push('p-center');
        if (align === 'L') cls.push('p-left');
        if (align === 'R') cls.push('p-right');

        let style = color ? `color:#${color};` : '';

        const escaped = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += `<span class="${cls.join(' ')}" style="${style}">${escaped}</span>`;
      });
    }

    return html;
  }

  function update() {
    const text = editor.value;
    const len = text.length;
    const counter = document.getElementById('charCount');
    counter.textContent = len + ' character' + (len !== 1 ? 's' : '');
    counter.classList.toggle('warn', len > 120);

    if (text.trim()) {
      preview.innerHTML = renderPreview(text);
    } else {
      preview.innerHTML = '<span style="color:rgba(255,255,255,0.25);font-size:14px;">Preview will appear here...</span>';
    }

    syncToolbarState();
  }

  function clearEditor() {
    editor.value = '';
    ['B','I','U','S','L','C','R'].forEach(k => document.getElementById('btn-'+k).classList.remove('is-on'));
    update();
    editor.focus();
  }

  function copyBio() {
    const text = editor.value;
    if (!text.trim()) return showStatus('Bio is empty', 'error');
    navigator.clipboard.writeText(text)
      .then(() => showStatus('✓ Copied!', 'success'))
      .catch(() => showStatus('Copy failed', 'error'));
  }

  function showStatus(msg, type) {
    clearTimeout(statusTimer);
    statusEl.textContent = msg;
    statusEl.className = 'show ' + type;
    statusTimer = setTimeout(() => { statusEl.className = ''; }, 2400);
  }

  document.getElementById('footerYear').textContent = new Date().getFullYear();

  // Theme
  const themeToggle = document.getElementById('themeToggle');
  const themeLabel  = document.getElementById('themeLabel');
  themeToggle.addEventListener('change', () => {
    const light = themeToggle.checked;
    document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
    themeLabel.textContent = light ? 'Light' : 'Dark';
  });

  editor.addEventListener('input', update);
  editor.addEventListener('keyup', syncToolbarState);
  editor.addEventListener('click', syncToolbarState);
  update();
</script>
